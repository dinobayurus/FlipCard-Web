{# templates/404.html — Halaman error 404 #}
{% extends "base.html" %}

{% block title %}Halaman Tidak Ditemukan{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Halaman Tidak Ditemukan</h1>
    <p class="error-message">Deck atau kartu yang kamu cari tidak ada atau sudah dihapus.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary" id="btn-back-home">Kembali ke Beranda</a>
</div>
{% endblock %}
